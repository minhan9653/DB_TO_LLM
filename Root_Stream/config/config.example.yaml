# Root_Stream 설정 예시 파일
# 실제 실행은 이 파일을 config.yaml로 복사한 뒤 값만 채워서 사용합니다.
# 민감정보(DB 계정, OPENAI_API_KEY)는 .env 또는 OS 환경변수 사용을 권장합니다.

# 지원 모드: natural_llm | prompt_llm | rag_prompt_llm
mode: rag_prompt_llm
llm_provider: ollama

paths:
  project_root: .
  prompt_file: prompts/prompt_templates.yaml
  log_file: data/logs/stream.log

ollama:
  model: qwen2.5:14b
  base_url: http://127.0.0.1:11434
  request_timeout: 60

openai:
  model: gpt-4.1-mini
  api_key: ""
  request_timeout: 60

retrieval:
  enabled: true
  embedding_model: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
  chroma_path: ../Root_Ingest/data/chroma
  collection_name: doc_chunks
  top_k: 3

prompts:
  active_prompt: query_generation_prompt
  schema_context: |
    # 테이블/컬럼 요약을 여기에 적습니다.
  business_rules: |
    # 도메인 규칙/필터 기준을 여기에 적습니다.
  additional_constraints: |
    # SQL 생성 제약(예: TOP + ORDER BY)을 여기에 적습니다.

logging:
  level: INFO

database:
  type: mssql
  host: 127.0.0.1
  port: 1433
  database: "<DB_NAME>"
  username: "<DB_USER>"
  password: "<DB_PASSWORD>"
  driver: "ODBC Driver 17 for SQL Server"
  encrypt: false
  trust_server_certificate: true
  timeout: 30

sql:
  allow_only_select: true
  max_rows: 1000

# 환경변수 오버라이드 지원 목록:
# STREAM_MODE, LLM_PROVIDER
# OLLAMA_MODEL, OLLAMA_BASE_URL
# OPENAI_MODEL, OPENAI_API_KEY
# LOG_LEVEL
# DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD, DB_DRIVER
# DB_TIMEOUT, DB_ENCRYPT, DB_TRUST_SERVER_CERTIFICATE
