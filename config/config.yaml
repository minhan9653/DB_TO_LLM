# DB_TO_LLM 프로젝트 통합 설정 파일
# 이 파일 하나에서 ingest, stream, db, llm, retrieval, logging 설정을 모두 관리한다.
# 민감정보(DB 비밀번호, API Key)는 .env 또는 OS 환경변수로 주입하는 것을 권장한다.
# 환경변수 오버라이드 목록: 파일 하단 주석 참고

# ────────────────────────────────────────
# LLM 설정
# ────────────────────────────────────────
llm_provider: ollama  # ollama | openai

ollama:
  model: qwen2.5:14b
  base_url: http://192.168.0.74:11434
  request_timeout: 300

openai:
  model: gpt-4.1-mini
  api_key: ""          # 환경변수 OPENAI_API_KEY 권장
  request_timeout: 60

# ────────────────────────────────────────
# 데이터베이스 설정
# ────────────────────────────────────────
database:
  type: mssql
  host: 192.168.0.11
  port: 1433
  database: SVM3PRISM
  username: prismadm
  password: prism@2025
  driver: "ODBC Driver 17 for SQL Server"
  encrypt: false
  trust_server_certificate: true
  timeout: 30
  
sql:
  allow_only_select: true      # SELECT 이외 구문 차단
  max_rows: 1000               # 조회 결과 최대 행 수
  allowed_tables:
    - dbo.ERROR_LOG_DATA
    - dbo.EVENT_LOG_DATA
    - dbo.WARNING_LOG_DATA

# ────────────────────────────────────────
# RAG / 임베딩 설정
# ────────────────────────────────────────
retrieval:
  enabled: true
  embedding_model: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
  chroma_path: data/chroma           # 벡터 스토어 저장 경로 (프로젝트 루트 기준)
  collection_name: doc_chunks
  top_k: 3

# ────────────────────────────────────────
# Ingest 설정
# ────────────────────────────────────────
ingest:
  doc_dir: data/doc                  # 원본 문서 디렉터리
  output_dir: data/ingest_output     # 중간 결과 저장 디렉터리
  supported_extensions:
    - .pdf
    - .docx
    - .txt
    - .md
    - .sql
  parser: simple                     # simple | docling | marker | unstructured
  chunk_size: 800
  chunk_overlap: 100

# ────────────────────────────────────────
# Stream / Planner 설정
# ────────────────────────────────────────
stream:
  prompts:
    prompt_file: src/db_to_llm/stream/prompts/prompt_templates.yaml
    schema_context: |
      [DB Schema Overview]

      주요 로그 테이블은 아래 3개이다.
      1) ERROR_LOG_DATA: 설비 오류/알람 로그
      2) EVENT_LOG_DATA: 설비 일반 이벤트 로그
      3) WARNING_LOG_DATA: 설비 경고 로그

      세 테이블은 공통적으로 반도체 제조 설비 로그를 저장하며,
      설비 식별자, 모듈 식별자, 발생 시각, 작업 유닛, 공정/LOT/Glass 정보,
      프로세스 ID, 파일명, 생성 시각을 포함한다.

      [Common Columns]
      - EQPID: 설비 ID
      - MODULEID: 설비 내 세부 모듈 ID
      - EVENTTIME: 실제 사건 발생 시각
      - UNIT: 작업 유닛 정보
      - STEP: 공정 단계
      - GLASSID: 글래스(기판) ID
      - GLASSID2: 보조 글래스 ID
      - LOTID: 생산 배치(LOT) ID
      - HOSTPPID: 호스트 프로세스 ID
      - EQPPPID: 설비 프로세스 ID
      - FILENAME: 로그 파일명
      - CREATETIME: 레코드 생성/적재 시각

      [ERROR_LOG_DATA]
      목적:
      - 설비에서 발생한 오류 및 알람 이력 저장
      - 장애 원인 분석, 설비 상태 추적, 조치 이력 조회에 사용

      주요 컬럼:
      - ACTION: 오류 발생 후 조치 내용 또는 처리 상태
      - ALARMID: 알람 코드
      - ALARMTEXT: 알람 설명 텍스트

      [EVENT_LOG_DATA]
      목적:
      - 설비에서 발생한 일반 이벤트 저장
      - 설비 동작 이력, 상태 변화, 공정 진행 흐름 추적에 사용

      주요 컬럼:
      - EVENTID: 이벤트 코드
      - COL1 ~ COL5: 이벤트 상세 정보용 범용 컬럼
        주의: COL1~COL5는 업무 의미가 고정되지 않았으므로,
        질문에서 명확한 의미가 주어지지 않으면 단정해서 사용하지 않는다.

      [WARNING_LOG_DATA]
      목적:
      - 설비에서 발생한 경고성 이벤트 저장
      - 즉시 장애는 아니지만 주의가 필요한 상태 추적에 사용

      주요 컬럼:
      - ACTION: 경고 발생 후 조치 내용 또는 처리 상태
      - ALARMID: 알람 코드
      - ALARMTEXT: 알람 설명 텍스트

      [Relationship / Analysis Hint]
      - ERROR_LOG_DATA와 WARNING_LOG_DATA는 구조가 매우 유사하다.
      - 오류/경고 통합 분석이 필요하면 UNION ALL 기반 조회를 고려할 수 있다.
      - 설비 단위 분석은 EQPID 기준,
        설비 내 세부 분석은 EQPID + MODULEID 기준이 유용하다.
      - 생산 맥락 분석은 GLASSID, GLASSID2, LOTID를 활용한다.
    business_rules: |
      [Business Interpretation Rules]

      1. 시간 해석 규칙
      - EVENTTIME은 실제 사건(오류/이벤트/경고) 발생 시각이다.
      - CREATETIME은 데이터 적재 또는 레코드 생성 시각이다.
      - 특별한 요청이 없으면 시간 조건은 EVENTTIME 기준으로 해석한다.

      2. 로그 유형 해석 규칙
      - 오류 관련 질문은 ERROR_LOG_DATA를 우선 사용한다.
      - 경고 관련 질문은 WARNING_LOG_DATA를 우선 사용한다.
      - 일반 동작 이력, 상태 변화, 이벤트 흐름 질문은 EVENT_LOG_DATA를 우선 사용한다.
      - 오류와 경고를 함께 비교하거나 통합 추세를 보려는 질문은
        ERROR_LOG_DATA와 WARNING_LOG_DATA를 함께 고려한다.

      3. 분석 단위 규칙
      - 설비별 분석: EQPID 기준 집계
      - 모듈별 분석: EQPID, MODULEID 기준 집계
      - 생산 이력 추적: LOTID, GLASSID, GLASSID2 활용
      - 공정 단계 분석: STEP 활용

      4. 코드/설명 해석 규칙
      - 오류/경고 원인 분석 시 ALARMID와 ALARMTEXT를 함께 조회하는 것이 좋다.
      - ACTION은 조치 내용 또는 처리 상태로 해석한다.
      - EVENT_LOG_DATA에서는 EVENTID가 핵심 이벤트 식별자이다.

      5. 범용 컬럼 사용 규칙
      - EVENT_LOG_DATA의 COL1~COL5는 의미가 고정되지 않은 범용 컬럼이다.
      - 사용자의 질문에 COL1~COL5의 의미가 명시되지 않으면,
        이 컬럼의 의미를 임의 추론하지 않는다.
      - 필요한 경우 COL1~COL5를 그대로 조회만 하고,
        해석은 보수적으로 수행한다.

      6. 기본 조회 우선순위
      - 최신순 요청이 있으면 EVENTTIME DESC 기준으로 정렬한다.
      - 빈도/건수 요청이 있으면 COUNT(*) 집계를 사용한다.
      - 첫 발생/마지막 발생 요청이 있으면 MIN(EVENTTIME), MAX(EVENTTIME)을 사용한다.
      - 추세/분포 요청이 있으면 날짜 단위 또는 설비/모듈 단위 GROUP BY를 우선 고려한다.
    additional_constraints: |
      [SQL Generation Constraints]

      1. DBMS는 MSSQL 기준으로 SQL을 생성한다.

      2. 결과 제한 규칙
      - 사용자가 건수 제한을 명시하지 않았고 원시 로그 전체 조회가 예상되면
        TOP 절을 사용해 결과 수를 제한한다.
      - 예: TOP 100, TOP 500
      - 단, COUNT / SUM / AVG / MIN / MAX 같은 집계 쿼리에는 불필요한 TOP을 사용하지 않는다.

      3. 정렬 규칙
      - TOP을 사용할 때는 가능하면 ORDER BY를 함께 사용한다.
      - 최신 데이터 조회는 ORDER BY EVENTTIME DESC를 기본으로 고려한다.
      - 오래된 순 조회는 ORDER BY EVENTTIME ASC를 사용한다.

      4. 컬럼 선택 규칙
      - SELECT * 사용을 피하고 필요한 컬럼만 명시한다.
      - 시간, 설비, 모듈, 코드, 설명, 조치 내용 등 질문에 직접 필요한 컬럼만 선택한다.

      5. 시간 필터 규칙
      - 기간 조건은 가능한 한 EVENTTIME 기준으로 작성한다.
      - 날짜 비교 시 MSSQL 문법에 맞게 작성한다.
      - "최근 N일" 요청은 DATEADD(DAY, -N, GETDATE()) 형태를 우선 고려한다.

      6. 집계 규칙
      - 설비별 건수: GROUP BY EQPID
      - 모듈별 건수: GROUP BY EQPID, MODULEID
      - 알람별 빈도: GROUP BY ALARMID, ALARMTEXT
      - 이벤트별 빈도: GROUP BY EVENTID

      7. 안전성 규칙
      - INSERT, UPDATE, DELETE, MERGE, DROP, ALTER, TRUNCATE 등 변경 쿼리는 생성하지 않는다.
      - 조회 목적의 SELECT 쿼리만 생성한다.

      8. 모호성 처리 규칙
      - 질문이 모호하면 가장 관련성 높은 테이블 1개 또는 소수의 테이블만 사용한다.
      - EVENT_LOG_DATA의 COL1~COL5 의미가 불명확하면 과도한 해석 없이 보수적으로 조회한다.

      9. 통합 조회 규칙
      - 오류와 경고를 함께 분석할 때는
        ERROR_LOG_DATA와 WARNING_LOG_DATA를 UNION ALL로 결합할 수 있다.
      - 이 경우 로그 구분용 literal 컬럼(예: 'ERROR' AS LOG_TYPE, 'WARNING' AS LOG_TYPE)을 추가하는 것을 고려한다.

# ────────────────────────────────────────
# 로깅 설정
# ────────────────────────────────────────
logging:
  level: INFO
  log_file: data/logs/db_to_llm.log  # 파일 로그 경로. 비워두면 콘솔만 출력

# ────────────────────────────────────────
# 환경변수 오버라이드 목록
# ────────────────────────────────────────
# LLM_PROVIDER          → llm_provider
# OLLAMA_MODEL          → ollama.model
# OLLAMA_BASE_URL       → ollama.base_url
# OPENAI_MODEL          → openai.model
# OPENAI_API_KEY        → openai.api_key
# DB_HOST               → database.host
# DB_PORT               → database.port
# DB_NAME               → database.database
# DB_USER               → database.username
# DB_PASSWORD           → database.password
# DB_DRIVER             → database.driver
# DB_TIMEOUT            → database.timeout
# DB_ENCRYPT            → database.encrypt
# DB_TRUST_SERVER_CERTIFICATE → database.trust_server_certificate
# LOG_LEVEL             → logging.level
